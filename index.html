function setActive(id){activeSet=APP_DATA.sets.find(s=>s.id===id)||APP_DATA.sets[0];items=flatten(activeSet);answers=Array(items.length).fill('');index=0;showStart()}
function questionRange(stim){const nums=stim.questions.map(q=>q.number);return nums.length===1?'Q'+nums[0]:'Q'+nums[0]+'-'+nums[nums.length-1]}
function renderSetShortcuts(){els.setShortcuts.innerHTML='';APP_DATA.sets.forEach(set=>{const group=document.createElement('section');group.className='shortcut-group';const title=document.createElement('h3');title.textContent=set.title;const grid=document.createElement('div');grid.className='shortcut-grid';const blocks=[];let chooseStart=-1,chooseEnd=-1;set.stimuli.forEach((stim,stimIndex)=>{if(stim.section==='Listen and Choose'){if(chooseStart===-1)chooseStart=stimIndex;chooseEnd=stimIndex;return}if(chooseStart!==-1){blocks.push({kind:'choose',start:chooseStart,end:chooseEnd});chooseStart=-1;chooseEnd=-1}blocks.push({kind:'single',start:stimIndex,end:stimIndex})});if(chooseStart!==-1)blocks.push({kind:'choose',start:chooseStart,end:chooseEnd});blocks.forEach(block=>{const first=set.stimuli[block.start],last=set.stimuli[block.end];const b=document.createElement('button');b.className='menu-button';b.type='button';if(block.kind==='choose'){const firstQ=first.questions[0].number,lastQ=last.questions[last.questions.length-1].number;b.innerHTML='<strong>Listen and Choose a Response</strong><span>'+firstQ+'-'+lastQ+'踰?| '+(block.end-block.start+1)+' audio questions</span>'}else{b.innerHTML='<strong>'+first.label+'</strong><span>'+first.section+' | '+questionRange(first)+'</span>'}b.onclick=()=>{setActive(set.id);index=flatten(activeSet).findIndex(item=>item.stimIndex===block.start);render()};grid.append(b)});group.append(title,grid);els.setShortcuts.append(group)})}
function showOnly(name){els.startScreen.classList.remove('show');els.finishScreen.classList.remove('show');els.result.classList.remove('show');els.quiz.classList.add('hide');if(name==='quiz')els.quiz.classList.remove('hide');else els[name].classList.add('show')}
function renderListen(item){const stim=item.stim;els.sectionLabel.textContent=stim.section;els.stimulusLabel.textContent=stim.label;els.listenTitle.textContent=stim.label;const isNewStimulus=lastStimulusId!==stim.id;if(!isNewStimulus)return;lastStimulusId=stim.id;audioReadyForQuestion=false;timerQuestionIndex=-1;stopQuestionTimer();els.timer.textContent='Listen';els.listenArea.innerHTML='<div class="audio-card"><div><div class="audio-label">Audio</div><div class="audio-title">'+stim.label+'</div></div><audio controls src="'+stim.audio+'"></audio></div>';const audio=els.listenArea.querySelector('audio');audio.onended=()=>{audioReadyForQuestion=true;startQuestionTimer(true)}}
function render(){showOnly('quiz');const item=items[index],q=item.q;renderListen(item);els.setLabel.textContent=activeSet.title;els.qno.textContent='Question '+q.number+' of '+items.length;els.progress.textContent=(index+1)+' / '+items.length+' 쨌 '+answered()+' answered';els.questionText.textContent=q.text||'Choose the best response.';els.answerArea.innerHTML='';q.choices.forEach((choice,i)=>{const b=document.createElement('button');b.className='choice'+(answers[index]===letters[i]?' selected':'');b.innerHTML='<span class="letter">'+letters[i]+'</span><span>'+choice+'</span>';b.onclick=()=>{answers[index]=letters[i];render()};els.answerArea.append(b)});els.prev.disabled=index===0;els.topPrev.disabled=index===0;els.next.textContent=index===items.length-1?'Finish':'Next';els.topNext.textContent=els.next.textContent;if(audioReadyForQuestion){startQuestionTimer()}else{els.timer.textContent='Listen'}}
function next(){if(index>=items.length-1){finish();return}index++;render()}
function prev(){if(index>0){index--;render()}}
function finish(){stopQuestionTimer();showOnly('finishScreen');els.sectionLabel.textContent='Finished';els.stimulusLabel.textContent=activeSet.title;els.listenTitle.textContent='SET Complete';els.listenArea.innerHTML='<div class="audio-card"><div class="audio-title">'+activeSet.title+' is complete.</div><div class="hint">You can check your answers now.</div></div>';els.setLabel.textContent=activeSet.title;els.progress.textContent='Check answers 쨌 '+answered()+' answered';els.topNext.textContent='Check Answers';els.timer.textContent='Done'}
function showResult(){stopQuestionTimer();let correct=0;els.resultList.innerHTML='';items.forEach((item,i)=>{const q=item.q;const ok=normalize(answers[i])===normalize(q.answer);if(ok)correct++;const div=document.createElement('div');div.className='result-item';div.innerHTML='<strong>Q'+q.number+'. '+(q.text||item.stim.label)+'</strong><br><span class="'+(ok?'ok':'bad')+'">Your answer: '+(answers[i]||'-')+' / Correct answer: '+q.answer+'</span><div class="hint">'+item.stim.label+' 쨌 Original Q'+q.originalNumber+'</div>';els.resultList.append(div)});els.summary.innerHTML=activeSet.title+'<br>Score: '+correct+' / '+items.length+'<br>Answered: '+answered();showOnly('result');els.progress.textContent='Result';els.timer.textContent='Done'}
function showStart(){stopQuestionTimer();audioReadyForQuestion=false;lastStimulusId=null;timerQuestionIndex=-1;showOnly('startScreen');els.sectionLabel.textContent='Ready';els.stimulusLabel.textContent='SET Select';els.listenTitle.textContent='';els.listenArea.innerHTML='';els.setLabel.textContent='Listening SETs';els.progress.textContent='Before start';els.timer.textContent='Ready';els.topPrev.disabled=true;els.topNext.textContent='Start'}
els.topMenu.onclick=showStart;els.next.onclick=next;els.topNext.onclick=()=>{if(els.startScreen.classList.contains('show')){render()}else if(els.finishScreen.classList.contains('show'))showResult();else next()};els.prev.onclick=prev;els.topPrev.onclick=prev;els.showAnswers.onclick=showResult;els.review.onclick=showStart;items=flatten(activeSet);answers=Array(items.length).fill('');renderSetShortcuts();showStart();
</script>
</body>
</html>
